<!-- ═══════════════════════════════════════════════════════════
     GALLERY SECTION
     Use when: gallery-1.jpg, gallery-2.jpg, gallery-3.jpg exist in img/
     Shows a dark-background 3-column photo grid.
     ═══════════════════════════════════════════════════════════ -->
<section class="gallery" id="gallery">
    <div class="container">
        <div class="section-header">
            <span class="section-badge">Our Work</span>
            <h2>See Our <span style="background:linear-gradient(135deg,var(--primary),var(--primary-light));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;">Results</span></h2>
            <p>Real projects, real results — quality you can see.</p>
        </div>
        <div class="gallery-grid">
            <div class="gallery-item">
                <img src="img/gallery-1.jpg" alt="{{BUSINESS_NAME}} project" loading="lazy">
            </div>
            <div class="gallery-item">
                <img src="img/gallery-2.jpg" alt="{{BUSINESS_NAME}} work" loading="lazy">
            </div>
            <div class="gallery-item">
                <img src="img/gallery-3.jpg" alt="{{BUSINESS_NAME}} results" loading="lazy">
            </div>
        </div>
    </div>
</section>
